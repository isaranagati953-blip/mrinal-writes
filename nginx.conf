server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    # Redirect all HTTP to HTTPS (Cloudflare handles the cert)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # Cloudflare Origin Certificate (download from CF dashboard)
    ssl_certificate     /etc/ssl/satsang/origin.pem;
    ssl_certificate_key /etc/ssl/satsang/origin-key.pem;

    # Only accept traffic from Cloudflare IPs (extra layer)
    # Update this list from: https://www.cloudflare.com/ips/
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 108.162.192.0/18;
    allow 131.0.72.0/22;
    allow 141.101.64.0/18;
    allow 162.158.0.0/15;
    allow 172.64.0.0/13;
    allow 173.245.48.0/20;
    allow 188.114.96.0/20;
    allow 190.93.240.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 127.0.0.1;   # localhost for health checks
    deny all;

    # Proxy to Next.js
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts — long for audio streaming
        proxy_read_timeout  3600;
        proxy_send_timeout  3600;
    }

    # Block direct access to sensitive paths
    location ~ ^/(\.env|prisma|scripts) {
        return 404;
    }

    # Static assets — cache aggressively
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }
}
